<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoKraft IA - Inteligencia Inmobiliaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .score-hot { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .score-warm { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .score-cold { background: #e0f2fe; color: #075985; border: 1px solid #bae6fd; }
        .ia-tip { background: #f8fafc; border-left: 4px solid #3b82f6; border-radius: 0 12px 12px 0; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginScreen" class="fixed inset-0 bg-[#0f172a] flex items-center justify-center z-[100]">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <div class="text-4xl mb-4">🏢</div>
            <h2 class="text-2xl font-extrabold text-slate-900 mb-6">Acceso Agente Elite</h2>
            <div class="space-y-4">
                <input type="text" id="nombreCorredor" placeholder="Tu Nombre (Ej: Heinz Hunter)" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input type="password" id="passInput" placeholder="Contraseña Master" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="entrar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">Iniciar Sesión</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-[#0f172a] text-white py-6 px-8 shadow-2xl mb-8">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Agente Re/Max</p>
                    <h1 id="displayCorredor" class="text-xl font-extrabold tracking-tight italic">AGENTE</h1>
                </div>
                <div class="flex gap-4">
                    <button onclick="fetchLeads()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold text-sm hover:scale-105 transition-transform">🔄 Refrescar</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-xs font-bold text-slate-400 uppercase">Total Leads</p>
                    <h2 id="tLeads" class="text-3xl font-black text-slate-800">0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-xs font-bold text-red-500 uppercase italic">Calientes 🔥</p>
                    <h2 id="tHot" class="text-3xl font-black text-red-600">0</h2>
                </div>
                <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between">
                    <div class="w-2/3 h-20">
                        <canvas id="chartStatus"></canvas>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Estado de Cartera</p>
                        <p class="text-xs text-slate-500 italic">IA Scoring Activo</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400 tracking-widest border-b">
                            <tr>
                                <th class="p-6">Calificación</th>
                                <th class="p-6">Lead & Contacto</th>
                                <th class="p-6">Perfil / Ubicación</th>
                                <th class="p-6">Análisis Táctico IA</th>
                                <th class="p-6 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="leadTable" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const MASTER_PASS = "top100";
        const S_URL = 'https://xqlvgzosvoodjtpxpgux.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxbHZnem9zdm9vZGp0cHhwZ3V4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTUzNDMsImV4cCI6MjA4OTAzMTM0M30.n9AhJIDzqZ_5qOHADcL2XnAYzF3YTyEw_vMkL8rF0pA';
        const sb = supabase.createClient(S_URL, S_KEY);
        let myChart = null;

        function entrar() {
            if(document.getElementById('passInput').value === MASTER_PASS) {
                const nombre = document.getElementById('nombreCorredor').value || "Agente Pro";
                document.getElementById('displayCorredor').innerText = nombre.toUpperCase();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                fetchLeads();
            } else { alert("Contraseña incorrecta"); }
        }

        async function fetchLeads() {
            const container = document.getElementById('leadTable');
            container.innerHTML = '<tr><td colspan="5" class="p-20 text-center animate-pulse text-slate-400">Sincronizando con la Bóveda IA...</td></tr>';

            const { data, error } = await sb.from('leads_inmobiliarios').select('*').order('score_lead', { ascending: false });
            if (error) return;

            container.innerHTML = '';
            let h=0, w=0, c=0;

            data.forEach(lead => {
                const s = lead.score_lead || 0;
                if(s >= 70) h++; else if(s >= 40) w++; else c++;
                let color = s >= 70 ? 'score-hot' : (s >= 40 ? 'score-warm' : 'score-cold');
                
                const cleanFono = (lead.telefono || '').replace(/\D/g,'');
                const nombreCorredor = document.getElementById('displayCorredor').innerText;
                const waMsg = encodeURIComponent(`Hola ${lead.nombre_cliente}, soy ${nombreCorredor} de Re/Max. He recibido tu consulta por la propiedad en ${lead.ubicacion_deseada}. ¿Te parece si coordinamos una breve llamada?`);

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors group";
                tr.innerHTML = `
                    <td class="p-6">
                        <div class="flex items-center gap-3">
                            <span class="px-4 py-2 rounded-xl font-black text-sm ${color}">${s}</span>
                        </div>
                    </td>
                    <td class="p-6">
                        <div class="font-bold text-slate-800">${lead.nombre_cliente}</div>
                        <div class="text-[10px] text-slate-400 font-bold">${lead.telefono}</div>
                    </td>
                    <td class="p-6 text-sm">
                        <div class="font-bold text-blue-600 uppercase text-[10px] tracking-tighter italic">${lead.tipo_operacion} ${lead.tipo_propiedad}</div>
                        <div class="text-slate-500 font-medium">${lead.ubicacion_deseada || 'N/A'}</div>
                    </td>
                    <td class="p-6">
                        <div class="ia-tip p-4 text-[11px] text-slate-600 leading-relaxed shadow-sm">
                            <b class="text-blue-600">💡 ESTRATEGIA:</b> ${lead.comentario_ia || 'Analizando perfil del lead...'}
                        </div>
                    </td>
                    <td class="p-6 text-right">
                        <a href="https://wa.me/${cleanFono}?text=${waMsg}" target="_blank" class="bg-[#25d366] text-white px-5 py-3 rounded-xl font-black text-[10px] hover:shadow-lg transition-all inline-block uppercase tracking-wider">Contactar</a>
                    </td>
                `;
                container.appendChild(tr);
            });

            document.getElementById('tLeads').innerText = data.length;
            document.getElementById('tHot').innerText = h;
            updateChart(h,w,c);
        }

        function updateChart(h,w,c) {
            const ctx = document.getElementById('chartStatus').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Fuego 🔥', 'Tibio ☀️', 'Frío ❄️'],
                    datasets: [{
                        data: [h,w,c],
                        backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6'],
                        borderRadius: 8,
                        barThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false, grid: { display: false } },
                        y: { border: { display: false }, grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
