<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Gerencial - RE/MAX Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .score-hot { background: #fee2e2; color: #991b1b; }
        .score-warm { background: #fef3c7; color: #92400e; }
        .score-cold { background: #e0f2fe; color: #075985; }
    </style>
</head>
<body>

    <div id="loginScreen" class="fixed inset-0 bg-[#0f172a] flex items-center justify-center z-[100]">
        <div class="bg-white p-10 rounded-3xl w-full max-w-md text-center">
            <h2 class="text-2xl font-extrabold text-blue-900 mb-6">RE/MAX Inteligencia</h2>
            <input type="text" id="nombreCorredor" placeholder="Agente (Ej: Heinz)" class="w-full p-3 border rounded-xl mb-4 outline-none">
            <input type="password" id="passInput" placeholder="Clave: top100" class="w-full p-3 border rounded-xl mb-6 outline-none">
            <button onclick="entrar()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">Acceder</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-[#0f172a] text-white py-5 px-8 mb-6 shadow-xl flex justify-between items-center">
            <div>
                <p class="text-[10px] text-blue-400 uppercase tracking-widest">Agente Autorizado</p>
                <h1 id="displayCorredor" class="text-xl font-extrabold italic">AGENTE</h1>
            </div>
            <button onclick="fetchLeads()" class="bg-blue-600 px-5 py-2 rounded-lg font-bold text-sm">🔄 Sincronizar</button>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-10">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="text-xs font-bold text-slate-500 uppercase">Buscar (Nombre, Fono, Zona)</label>
                    <input type="text" id="filtroTexto" onkeyup="aplicarFiltros()" placeholder="Ej: Las Condes, +569..." class="w-full p-2 border rounded-lg mt-1 text-sm outline-none focus:border-blue-500">
                </div>
                <div class="w-40">
                    <label class="text-xs font-bold text-slate-500 uppercase">Operación</label>
                    <select id="filtroOperacion" onchange="aplicarFiltros()" class="w-full p-2 border rounded-lg mt-1 text-sm outline-none">
                        <option value="">Todas</option>
                        <option value="Compra">Compra</option>
                        <option value="Arriendo">Arriendo</option>
                        <option value="Venta">Venta</option>
                    </select>
                </div>
                <div class="w-40">
                    <label class="text-xs font-bold text-slate-500 uppercase">Temperatura</label>
                    <select id="filtroTemp" onchange="aplicarFiltros()" class="w-full p-2 border rounded-lg mt-1 text-sm outline-none">
                        <option value="">Todas</option>
                        <option value="Fuego">🔥 Fuego (Caliente)</option>
                        <option value="Tibio">☀️ Tibio</option>
                        <option value="Frío">❄️ Frío</option>
                    </select>
                </div>
                <button onclick="limpiarFiltros()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-200">Limpiar</button>
            </div>

            <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b">
                        <tr>
                            <th class="p-5">Temp & Score</th>
                            <th class="p-5">Lead / Canal</th>
                            <th class="p-5">Búsqueda</th>
                            <th class="p-5">Análisis IA</th>
                            <th class="p-5 text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="leadTable" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const S_URL = 'https://xqlvgzosvoodjtpxpgux.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxbHZnem9zdm9vZGp0cHhwZ3V4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTUzNDMsImV4cCI6MjA4OTAzMTM0M30.n9AhJIDzqZ_5qOHADcL2XnAYzF3YTyEw_vMkL8rF0pA';
        const sb = supabase.createClient(S_URL, S_KEY);
        let todosLosLeads = []; // Memoria global para los filtros

        function entrar() {
            if(document.getElementById('passInput').value === "top100") {
                document.getElementById('displayCorredor').innerText = document.getElementById('nombreCorredor').value || "Heinz";
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                fetchLeads();
            } else { alert("Clave incorrecta"); }
        }

        async function fetchLeads() {
            document.getElementById('leadTable').innerHTML = '<tr><td colspan="5" class="p-10 text-center animate-pulse">Cargando Bóveda...</td></tr>';
            const { data, error } = await sb.from('leads_inmobiliarios').select('*').order('created_at', { ascending: false });
            if (!error) {
                todosLosLeads = data;
                aplicarFiltros();
            }
        }

        function aplicarFiltros() {
            const txt = document.getElementById('filtroTexto').value.toLowerCase();
            const op = document.getElementById('filtroOperacion').value;
            const temp = document.getElementById('filtroTemp').value;

            const filtrados = todosLosLeads.filter(l => {
                const matchTxt = (l.nombre_cliente||'').toLowerCase().includes(txt) || (l.telefono||'').includes(txt) || (l.ubicacion_deseada||'').toLowerCase().includes(txt);
                const matchOp = op === "" || l.tipo_operacion === op;
                const matchTemp = temp === "" || l.temperatura_lead === temp;
                return matchTxt && matchOp && matchTemp;
            });

            renderTabla(filtrados);
        }

        function limpiarFiltros() {
            document.getElementById('filtroTexto').value = '';
            document.getElementById('filtroOperacion').value = '';
            document.getElementById('filtroTemp').value = '';
            aplicarFiltros();
        }

        function renderTabla(data) {
            const container = document.getElementById('leadTable');
            container.innerHTML = '';
            if(data.length === 0) return container.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-400">No hay leads que coincidan con los filtros.</td></tr>';

            data.forEach(l => {
                const s = l.score_lead || 0;
                let color = s >= 80 ? 'score-hot' : (s >= 45 ? 'score-warm' : 'score-cold');
                const fonoLimpio = (l.telefono || '').replace(/\D/g,'');
                const msg = encodeURIComponent(`Hola ${l.nombre_cliente || ''}, soy ${document.getElementById('displayCorredor').innerText} de RE/MAX. ¿Hablemos sobre tu búsqueda en ${l.ubicacion_deseada}?`);

                container.innerHTML += `
                    <tr class="hover:bg-slate-50">
                        <td class="p-5"><span class="px-3 py-1 rounded-lg font-black text-[11px] uppercase ${color}">${l.temperatura_lead || 'N/A'} (${s})</span></td>
                        <td class="p-5">
                            <div class="font-bold text-slate-800">${l.nombre_cliente || 'Sin Nombre'}</div>
                            <div class="text-[10px] font-bold text-slate-400">📞 ${l.telefono} | 🌐 ${l.origen_lead || 'Web'}</div>
                        </td>
                        <td class="p-5 text-sm">
                            <div class="font-bold text-blue-600">${l.tipo_operacion || '-'} ${l.tipo_propiedad || '-'}</div>
                            <div class="text-slate-500 text-xs">${l.ubicacion_deseada || 'Zona no definida'}</div>
                        </td>
                        <td class="p-5">
                            <div class="bg-slate-50 p-3 rounded-lg text-xs text-slate-600 border-l-2 border-blue-500">
                                ${l.comentario_ia || 'Sin análisis.'}
                            </div>
                        </td>
                        <td class="p-5 text-right">
                            <a href="https://wa.me/${fonoLimpio}?text=${msg}" target="_blank" class="bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold text-[10px] uppercase">WhatsApp</a>
                        </td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
