<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CRM - Motor IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6">
    
    <div id="loginScreen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-6">
                <div class="text-5xl mb-4">⚙️</div>
                <h2 class="text-2xl font-bold text-slate-800">Acceso al CRM IA</h2>
                <p class="text-slate-500 text-sm mt-1">Ingresa tus credenciales de agencia</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre de tu Corredora/Agencia:</label>
                    <input type="text" id="nombreAgencia" placeholder="Ej: Juan Pérez Propiedades" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#0f172a] focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Contraseña de Acceso:</label>
                    <input type="password" id="passInput" placeholder="Tu clave secreta" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#0f172a] focus:border-transparent">
                </div>

                <button onclick="iniciarSesion()" class="w-full bg-[#0f172a] hover:bg-slate-800 text-white font-bold py-3.5 rounded-lg transition-colors mt-2">
                    Acceder a la Bóveda
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="max-w-6xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-bold text-slate-800" id="tituloAgencia">Dashboard de Leads</h1>
                <p class="text-emerald-600 font-semibold text-sm mt-1 flex items-center gap-1">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></span>
                    Sistema Motor IA Activo
                </p>
            </div>
            <button onclick="cargarLeads()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium transition-colors border border-slate-300">
                🔄 Refrescar Datos
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm">FECHA</th>
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm">CLIENTE</th>
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm">TELÉFONO</th>
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm">INFO / PRESUPUESTO</th>
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm text-right">CONTACTO RÁPIDO</th>
                        </tr>
                    </thead>
                    <tbody id="tablaLeads" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD_SECRETA = "top100";
        let nombreEmpresaGlobal = "Mi Corredora"; // Valor por defecto

        function iniciarSesion() {
            const pass = document.getElementById('passInput').value;
            const nombreAgencia = document.getElementById('nombreAgencia').value.trim();

            if(pass === PASSWORD_SECRETA) {
                // Si el usuario no pone nombre, usamos uno genérico
                nombreEmpresaGlobal = nombreAgencia !== "" ? nombreAgencia : "nuestra corredora";
                
                // Actualizamos el título del panel
                document.getElementById('tituloAgencia').innerText = `Leads: ${nombreEmpresaGlobal}`;
                
                // Ocultamos login y mostramos tabla
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                
                cargarLeads();
            } else {
                alert("❌ Contraseña incorrecta.");
            }
        }

        // Permite apretar "Enter" en la contraseña
        document.getElementById("passInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); iniciarSesion(); }
        });

        const supabaseUrl = 'https://xqlvgzosvoodjtpxpgux.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxbHZnem9zdm9vZGp0cHhwZ3V4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTUzNDMsImV4cCI6MjA4OTAzMTM0M30.n9AhJIDzqZ_5qOHADcL2XnAYzF3YTyEw_vMkL8rF0pA';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarLeads() {
            const tbody = document.getElementById('tablaLeads');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-500">Cargando base de datos segura... ⏳</td></tr>';

            const { data, error } = await supabaseClient
                .from('leads_inmobiliarios')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-500">❌ Error de conexión al servidor CRM.</td></tr>';
                return;
            }

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-500">No hay nuevos prospectos en la base de datos.</td></tr>';
                return;
            }

            tbody.innerHTML = ''; 

            data.forEach(lead => {
                const fecha = new Date(lead.created_at).toLocaleDateString('es-CL', {
                    day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit'
                });
                
                const fono = lead.telefono || '';
                const fonoLimpio = fono.replace(/[^0-9]/g, ''); 
                
                const nombreCliente = lead.nombre_cliente || 'Cliente';
                
                // 🚀 AQUÍ ESTÁ LA MAGIA SAAS: El mensaje usa la variable de la empresa que puso el cliente al iniciar sesión
                const msjWa = encodeURIComponent(`Hola ${nombreCliente}, soy de ${nombreEmpresaGlobal}. Vi que solicitaste información sobre una propiedad. ¿En qué te puedo asesorar hoy?`);
                const linkWa = `https://wa.me/${fonoLimpio}?text=${msjWa}`;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 px-6 text-[14px] text-slate-500">${fecha}</td>
                    <td class="py-4 px-6 text-[15px] font-bold text-slate-800 capitalize">${nombreCliente}</td>
                    <td class="py-4 px-6 text-[15px] text-slate-600 font-medium">${lead.telefono || 'N/A'}</td>
                    <td class="py-4 px-6 text-[14px] text-slate-700">${lead.presupuesto || 'Sin detalles'}</td>
                    <td class="py-4 px-6 text-right">
                        <a href="${linkWa}" target="_blank" class="inline-flex items-center justify-center bg-[#25d366] hover:bg-[#128c7e] text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-sm w-full md:w-auto">
                            💬 Iniciar Chat
                        </a>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
