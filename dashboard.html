<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gerencial - ImmoKraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="p-6">
    
    <div id="loginScreen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm text-center">
            <div class="text-5xl mb-4">🏢</div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Penthouse Privado</h2>
            <p class="text-slate-500 mb-6 text-sm">Dashboard Gerencial ImmoKraft</p>
            <input type="password" id="passInput" placeholder="Ingresa tu clave secreta" class="w-full px-4 py-3 border border-slate-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-[#1e3a8a] text-center">
            <button onclick="checkPassword()" class="w-full bg-[#1e3a8a] hover:bg-blue-900 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">Entrar a la Bóveda</button>
        </div>
    </div>

    <div id="dashboard" class="max-w-6xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Tus Prospectos (Leads)</h1>
                <p class="text-slate-500 mt-1">Conectado en tiempo real con Inteligencia Artificial</p>
            </div>
            <button onclick="cargarLeads()" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 transition-colors shadow-sm">
                <span>🔄 Actualizar Tabla</span>
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm uppercase">Fecha de Ingreso</th>
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm uppercase">Cliente</th>
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm uppercase">Teléfono</th>
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm uppercase">Presupuesto / Info</th>
                            <th class="py-4 px-6 font-semibold text-slate-600 text-sm uppercase text-right">Acción Comercial</th>
                        </tr>
                    </thead>
                    <tbody id="tablaLeads" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🚨 TU CONTRASEÑA SECRETA ESTÁ AQUÍ (Puedes cambiar "top100" por la que quieras)
        const PASSWORD_SECRETA = "top100";

        function checkPassword() {
            const input = document.getElementById('passInput').value;
            if(input === PASSWORD_SECRETA) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                cargarLeads();
            } else {
                alert("❌ Contraseña incorrecta. Acceso denegado.");
            }
        }

        // Permite apretar "Enter" para entrar
        document.getElementById("passInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); checkPassword(); }
        });

        // Conexión oficial a tu Bóveda de Supabase
        const supabaseUrl = 'https://xqlvgzosvoodjtpxpgux.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxbHZnem9zdm9vZGp0cHhwZ3V4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTUzNDMsImV4cCI6MjA4OTAzMTM0M30.n9AhJIDzqZ_5qOHADcL2XnAYzF3YTyEw_vMkL8rF0pA';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarLeads() {
            const tbody = document.getElementById('tablaLeads');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-500">Buscando prospectos en la bóveda... ⏳</td></tr>';

            const { data, error } = await supabase
                .from('leads_inmobiliarios')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error cargando leads:", error);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-500">❌ Hubo un problema conectando con Supabase.</td></tr>';
                return;
            }

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-500">Tu bóveda está vacía. ¡Ve a conseguir leads!</td></tr>';
                return;
            }

            tbody.innerHTML = ''; // Limpiar mensaje de carga

            data.forEach(lead => {
                // Formatear la fecha para que se vea bonita
                const fecha = new Date(lead.created_at).toLocaleDateString('es-CL', {
                    day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit'
                });
                
                // Extraer el teléfono y limpiarlo para el link de WhatsApp
                const fono = lead.telefono || '';
                const fonoLimpio = fono.replace(/[^0-9]/g, ''); 
                
                // Mensaje predeterminado para WhatsApp
                const msjWa = encodeURIComponent(`Hola ${lead.nombre_cliente}, soy de ImmoKraft. Vi que estás buscando una propiedad. ¿Cómo te puedo ayudar?`);
                const linkWa = `https://wa.me/${fonoLimpio}?text=${msjWa}`;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 px-6 text-[15px] text-slate-500">${fecha}</td>
                    <td class="py-4 px-6 text-[15px] font-bold text-slate-800 capitalize">${lead.nombre_cliente || 'Desconocido'}</td>
                    <td class="py-4 px-6 text-[15px] text-slate-600 font-medium">${lead.telefono || 'Sin fono'}</td>
                    <td class="py-4 px-6 text-[15px] text-emerald-600 font-semibold">${lead.presupuesto || 'Sin datos'}</td>
                    <td class="py-4 px-6 text-right">
                        <a href="${linkWa}" target="_blank" class="inline-flex items-center justify-center bg-[#25d366] hover:bg-[#128c7e] text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-sm">
                            💬 Hablar por WhatsApp
                        </a>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
