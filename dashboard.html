<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Master CRM - ImmoKraft IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .score-hot { background-color: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
        .score-warm { background-color: #fffbeb; color: #d97706; border: 1px solid #fef3c7; }
        .score-cold { background-color: #f0f9ff; color: #0284c7; border: 1px solid #e0f2fe; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginScreen" class="fixed inset-0 bg-[#0f172a] flex items-center justify-center z-[100]">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <span class="text-5xl">🏢</span>
            <h2 class="text-3xl font-extrabold text-slate-900 mt-4 mb-2">ImmoKraft Pro</h2>
            <p class="text-slate-500 mb-8 font-medium">Panel de Control Gerencial</p>
            <div class="space-y-4">
                <input type="text" id="nombreAgencia" placeholder="Nombre de tu Agencia" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
                <input type="password" id="passInput" placeholder="Contraseña Master" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
                <button onclick="acceder()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                    Acceder al Ecosistema
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-[#0f172a] text-white py-6 px-8 mb-8 shadow-xl">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 id="tituloAgencia" class="text-xl font-extrabold tracking-tight uppercase">DASHBOARD</h1>
                <button onclick="cargarLeads()" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-xl text-sm font-bold transition-all">🔄 Actualizar</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-white p-6 rounded-2xl border border-slate-100 flex flex-col items-center shadow-sm">
                    <h3 class="text-xs font-bold text-slate-400 uppercase mb-4">Calidad de Cartera</h3>
                    <div class="w-40 h-40"><canvas id="chartLeads"></canvas></div>
                </div>
                <div id="statsSummary" class="md:col-span-2 bg-white p-8 rounded-2xl border border-slate-100 grid grid-cols-3 gap-4 items-center shadow-sm">
                    </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <th class="py-5 px-8">Score</th>
                                <th class="py-5 px-6">Cliente</th>
                                <th class="py-5 px-6">Propiedad & Zona</th>
                                <th class="py-5 px-6">Análisis IA</th>
                                <th class="py-5 px-8 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaLeads" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const CLAVE = "top100";
        let empresa = "Agencia";
        let miChart = null;

        const sUrl = 'https://xqlvgzosvoodjtpxpgux.supabase.co';
        const sKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxbHZnem9zdm9vZGp0cHhwZ3V4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTUzNDMsImV4cCI6MjA4OTAzMTM0M30.n9AhJIDzqZ_5qOHADcL2XnAYzF3YTyEw_vMkL8rF0pA';
        const client = supabase.createClient(sUrl, sKey);

        function acceder() {
            const p = document.getElementById('passInput').value;
            if(p === CLAVE) {
                empresa = document.getElementById('nombreAgencia').value || "Inmobiliaria";
                document.getElementById('tituloAgencia').innerText = `LEADS: ${empresa.toUpperCase()}`;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                cargarLeads();
            } else { alert("Clave Incorrecta"); }
        }

        async function cargarLeads() {
            const tbody = document.getElementById('tablaLeads');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10">Cargando...</td></tr>';

            const { data, error } = await client
                .from('leads_inmobiliarios')
                .select('*')
                .order('score_lead', { ascending: false });

            if (error) return;
            tbody.innerHTML = '';
            let h=0, w=0, c=0;

            data.forEach(l => {
                const s = l.score_lead || 0;
                if(s >= 70) h++; else if(s >= 40) w++; else c++;
                
                let badge = s >= 70 ? 'score-hot' : (s >= 40 ? 'score-warm' : 'score-cold');
                const fono = (l.telefono || '').replace(/[^0-9]/g, '');
                const msg = encodeURIComponent(`Hola ${l.nombre_cliente}, soy de ${empresa}. ¿Hablemos de tu búsqueda en ${l.ubicacion_deseada}?`);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-6 px-8"><span class="px-3 py-1 rounded-full font-bold text-xs ${badge}">${s}</span></td>
                    <td class="py-6 px-6"><b>${l.nombre_cliente}</b><br><small>${l.telefono}</small></td>
                    <td class="py-6 px-6 text-sm"><b>${l.tipo_operacion} ${l.tipo_propiedad}</b><br>${l.ubicacion_deseada}</td>
                    <td class="py-6 px-6 text-xs italic text-slate-500">"${l.comentario_ia || 'Sin análisis'}"</td>
                    <td class="py-6 px-8 text-right"><a href="https://wa.me/${fono}?text=${msg}" target="_blank" class="bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold text-[10px]">WHATSAPP</a></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('statsSummary').innerHTML = `<div class="text-center"><b>${h}</b><br><small>CALIENTES</small></div><div class="text-center"><b>${w}</b><br><small>TIBIOS</small></div><div class="text-center"><b>${c}</b><br><small>FRÍOS</small></div>`;
            renderChart(h, w, c);
        }

        function renderChart(h, w, c) {
            const ctx = document.getElementById('chartLeads').getContext('2d');
            if(miChart) miChart.destroy();
            miChart = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: [h, w, c], backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6'], borderWidth: 0 }] },
                options: { cutout: '80%' }
            });
        }
    </script>
</body>
</html>
