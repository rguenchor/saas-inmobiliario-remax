<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - RE/MAX Chile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #f4f5f7; font-family: 'Inter', sans-serif; } </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-xl p-8 bg-white rounded-2xl shadow-xl border-t-8 border-[#dc1c2e]">
        
        <div class="text-center mb-6 border-b pb-6">
            <img src="./Remax_logo.jpg" alt="RE/MAX Logo" class="h-16 mx-auto mb-4 object-contain">
            <h2 class="text-2xl font-bold text-[#003da5]">Te ayudamos a encontrar tu propiedad ideal</h2>
            <p class="text-gray-500 text-sm mt-2">Déjanos tus datos y un agente experto te contactará a la brevedad.</p>
        </div>

        <form id="contactForm" class="space-y-5">
            <input type="hidden" id="webhookUrl" value="https://hook.us2.make.com/f6h441b2wpgnxd7bxk0m2rqus8whxeip">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="font-semibold text-gray-700 text-sm">Nombre</label>
                    <input type="text" id="nombreCliente" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#003da5] outline-none" placeholder="Ej: Juan Pérez">
                </div>
                <div>
                    <label class="font-semibold text-gray-700 text-sm">Teléfono (WhatsApp)</label>
                    <input type="tel" id="telefonoLead" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#003da5] outline-none" placeholder="+569...">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="font-semibold text-gray-700 text-sm">¿Qué buscas?</label>
                    <select id="tipoOperacion" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#003da5] outline-none">
                        <option value="Comprar">Comprar</option>
                        <option value="Arrendar">Arrendar</option>
                        <option value="Vender">Vender mi propiedad</option>
                    </select>
                </div>
                <div>
                    <label class="font-semibold text-gray-700 text-sm">Tipo de Propiedad</label>
                    <select id="tipoPropiedad" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#003da5] outline-none">
                        <option value="Casa">Casa</option>
                        <option value="Departamento">Departamento</option>
                        <option value="Terreno/Parcela">Terreno / Parcela</option>
                        <option value="Comercial">Local Comercial</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="font-semibold text-gray-700 text-sm">Presupuesto Estimado / Zona de interés</label>
                <input type="text" id="presupuestoZona" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#003da5] outline-none" placeholder="Ej: 5000 UF, en Providencia o Ñuñoa">
            </div>

            <div>
                <label class="font-semibold text-gray-700 text-sm">Comentarios adicionales (Opcional)</label>
                <textarea id="mensajeExtra" rows="2" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#003da5] outline-none" placeholder="Ej: Necesito que tenga 3 dormitorios y estacionamiento..."></textarea>
            </div>

            <button type="submit" id="sendBtn" class="w-full p-4 bg-[#003da5] text-white font-bold rounded-lg hover:bg-blue-800 transition-colors text-lg shadow-md">
                Enviar Solicitud
            </button>
            <div id="statusMsg" class="hidden mt-4 p-4 rounded-lg text-center font-medium"></div>
        </form>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            const statusMsg = document.getElementById('statusMsg');
            const url = document.getElementById('webhookUrl').value;

            // Unimos todos los campos en un solo súper-mensaje para que la IA lo analice perfecto
            const nombre = document.getElementById('nombreCliente').value;
            const op = document.getElementById('tipoOperacion').value;
            const prop = document.getElementById('tipoPropiedad').value;
            const pres = document.getElementById('presupuestoZona').value;
            const extra = document.getElementById('mensajeExtra').value;
            
            const mensajeConsolidado = `Hola, mi nombre es ${nombre}. Busco ${op} un(a) ${prop}. Presupuesto/Lugar: ${pres}. Comentarios: ${extra}`;
            const telefono = document.getElementById('telefonoLead').value;

            btn.innerText = 'Enviando solicitud...'; 
            btn.disabled = true;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mensaje: mensajeConsolidado,
                        telefono: telefono,
                        canal: "Web Formulario"
                    })
                });

                if (!response.ok) throw new Error('Error en envío');

                statusMsg.className = 'mt-4 p-4 rounded-lg text-center font-medium bg-green-100 text-green-700 border border-green-200';
                statusMsg.innerHTML = '✅ ¡Solicitud enviada con éxito! Un agente te contactará pronto.';
                document.getElementById('contactForm').reset();
            } catch (error) {
                statusMsg.className = 'mt-4 p-4 rounded-lg text-center font-medium bg-red-100 text-red-700 border border-red-200';
                statusMsg.innerHTML = '❌ Hubo un error al enviar. Por favor intenta de nuevo.';
            } finally {
                btn.innerText = 'Enviar Solicitud'; 
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
