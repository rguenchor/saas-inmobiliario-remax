<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piloto IA - ImmoKraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f5f7; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg p-8 bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
        
        <div class="text-center mb-8 border-b pb-6">
            <div class="inline-block p-3 bg-blue-50 rounded-full mb-3">
                <span class="text-3xl">🤖</span>
            </div>
            <h2 class="text-[28px] font-bold text-[#1e3a8a] mb-2">
                Simulador IA
            </h2>
            <p class="text-[15px] text-gray-500">Escribe como si fueras un cliente real. La IA de ImmoKraft hará el resto.</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-[15px] font-semibold text-[#334155] mb-2">Mensaje Desordenado (WhatsApp)</label>
                <textarea id="mensajeLead" rows="5" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-[15px] shadow-sm resize-none"
                    placeholder="Ej: Hola! ando buscando una casa para comprar, tengo 5500 uf..."></textarea>
            </div>

            <button onclick="enviarBoveda()" id="sendBtn"
                class="w-full py-4 px-4 bg-[#2563eb] hover:bg-blue-700 text-white text-[16px] font-bold rounded-lg transition-colors shadow-md flex justify-center items-center gap-2">
                <span>Enviar a la Bóveda de ImmoKraft</span>
            </button>
            
            <div id="statusMsg" class="hidden mt-4 p-4 rounded-lg text-[15px] text-center font-medium"></div>
        </div>
    </div>

    <script>
        async function enviarBoveda() {
            const btn = document.getElementById('sendBtn');
            const statusMsg = document.getElementById('statusMsg');
            const mensaje = document.getElementById('mensajeLead').value;
            const url = "https://hook.us2.make.com/f6h441b2wpgnxd7bxk0m2rqus8whxeip";

            // Si el cliente no escribe nada, le avisamos
            if (!mensaje) {
                alert("¡Arquitecto! Escribe un mensaje de prueba antes de enviar.");
                return;
            }

            btn.innerHTML = '<span class="pulse">Analizando con IA...</span>';
            btn.disabled = true;
            btn.classList.add('opacity-80');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje: mensaje })
                });

                // Si Make.com recibe el mensaje con éxito:
                statusMsg.classList.remove('hidden', 'bg-red-50', 'text-red-700');
                statusMsg.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
                statusMsg.innerHTML = '✅ <b>¡Magia!</b> Tu lead fue analizado y guardado en la bóveda corporativa.';
                
                // Solo si es exitoso, borramos el texto
                document.getElementById('mensajeLead').value = ''; 

            } catch (error) {
                // Si la conexión falla, te saltará una alerta en la pantalla
                alert("Hubo un bloqueo al contactar a Make.com. Revisa tu consola.");
                statusMsg.classList.remove('hidden', 'bg-green-50', 'text-green-700');
                statusMsg.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
                statusMsg.innerHTML = '❌ Hubo un error de conexión.';
            } finally {
                btn.innerHTML = 'Enviar a la Bóveda de ImmoKraft';
                btn.disabled = false;
                btn.classList.remove('opacity-80');
            }
        }
    </script>
</body>
</html>
