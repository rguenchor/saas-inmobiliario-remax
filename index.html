<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piloto IA - ImmoKraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #f4f5f7; } </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-lg p-8 bg-white rounded-2xl shadow-xl">
        <div class="text-center mb-8 border-b pb-6">
            <span class="text-4xl">🤖</span>
            <h2 class="text-2xl font-bold text-[#1e3a8a] mt-2">Simulador IA Re/Max</h2>
        </div>
        <form id="simulatorForm" class="space-y-4">
            <input type="hidden" id="webhookUrl" value="PEGA_TU_URL_DE_MAKE_AQUI">
            
            <div>
                <label class="font-semibold text-gray-700 text-sm">Teléfono (Simulado)</label>
                <input type="text" id="telefonoLead" required class="w-full p-3 border rounded-lg" placeholder="+56912345678">
            </div>
            <div>
                <label class="font-semibold text-gray-700 text-sm">Mensaje del Cliente</label>
                <textarea id="mensajeLead" rows="4" required class="w-full p-3 border rounded-lg" placeholder="Hola, busco casa en Concón..."></textarea>
            </div>
            <button type="submit" id="sendBtn" class="w-full p-4 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700">Enviar a la Bóveda</button>
            <div id="statusMsg" class="hidden mt-4 p-4 rounded-lg text-center font-medium"></div>
        </form>
    </div>

    <script>
        document.getElementById('simulatorForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            const statusMsg = document.getElementById('statusMsg');
            const url = document.getElementById('webhookUrl').value;
            
            if(url === "PEGA_TU_URL_DE_MAKE_AQUI") return alert("¡Falta la URL del Webhook!");

            btn.innerText = 'Analizando...'; btn.disabled = true;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mensaje: document.getElementById('mensajeLead').value,
                        telefono: document.getElementById('telefonoLead').value,
                        canal: "Web"
                    })
                });
                statusMsg.className = 'mt-4 p-4 rounded-lg text-center font-medium bg-green-100 text-green-700';
                statusMsg.innerHTML = '✅ Lead enviado y analizado.';
            } catch (error) {
                statusMsg.className = 'mt-4 p-4 rounded-lg text-center font-medium bg-red-100 text-red-700';
                statusMsg.innerHTML = '❌ Error de conexión.';
            } finally {
                btn.innerText = 'Enviar a la Bóveda'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
