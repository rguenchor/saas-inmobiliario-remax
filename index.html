<form id="simulatorForm" class="space-y-6">
            <div class="hidden">
                <input type="url" id="webhookUrl" value="TU_URL_DE_MAKE_AQUI" required>
            </div>

            <div>
                <label class="block text-[15px] font-semibold text-[#334155] mb-2">Tu Número de WhatsApp</label>
                <input type="text" id="telefonoLead" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-[15px] shadow-sm"
                    placeholder="Ej: +56912345678">
            </div>

            <div>
                <label class="block text-[15px] font-semibold text-[#334155] mb-2">Mensaje (WhatsApp)</label>
                <textarea id="mensajeLead" rows="4" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-[15px] shadow-sm resize-none"
                    placeholder="Ej: Hola! ando buscando una casa..."></textarea>
            </div>

            <button type="submit" id="sendBtn"
                class="w-full py-4 px-4 bg-[#2563eb] hover:bg-blue-700 text-white text-[16px] font-bold rounded-lg transition-colors shadow-md flex justify-center items-center gap-2">
                <span>Enviar a la Bóveda de ImmoKraft</span>
            </button>
            
            <div id="statusMsg" class="hidden mt-4 p-4 rounded-lg text-[15px] text-center font-medium"></div>
        </form>

    <script>
        document.getElementById('simulatorForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('sendBtn');
            const statusMsg = document.getElementById('statusMsg');
            const url = document.getElementById('webhookUrl').value;
            const mensaje = document.getElementById('mensajeLead').value;
            const telefono = document.getElementById('telefonoLead').value; // CAPTURAMOS EL TELÉFONO

            if(url === "TU_URL_DE_MAKE_AQUI") {
                alert("¡Arquitecto! Olvidaste pegar la URL de tu Webhook.");
                return;
            }

            btn.innerHTML = '<span>Analizando...</span>';
            btn.disabled = true;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // AHORA ENVIAMOS AMBOS DATOS
                    body: JSON.stringify({ 
                        mensaje: mensaje,
                        telefono: telefono 
                    })
                });

                statusMsg.classList.remove('hidden');
                statusMsg.innerHTML = '✅ Lead enviado con éxito.';
            } catch (error) {
                alert("Error de conexión");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Enviar a la Bóveda de ImmoKraft';
            }
        });
    </script>
